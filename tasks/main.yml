---
- name: Assert a supported platform
  ansible.builtin.assert:
    that:
      - ansible_os_family == 'RedHat'
    fail_msg: >-
      This role supports RedHat-family distributions only
      (CentOS/RHEL/Rocky/Alma/Amazon Linux), got '{{ ansible_distribution }}'.
  tags: ['nexus3']

- name: Set up the nexus service account
  ansible.builtin.import_tasks: user.yml
  tags: ['nexus3']

- name: Install nexus
  ansible.builtin.import_tasks: install.yml
  tags: ['nexus3']

- name: Configure nexus
  ansible.builtin.import_tasks: configure.yml
  tags: ['nexus3']

- name: Manage the nexus service
  ansible.builtin.import_tasks: service.yml
  tags: ['nexus3']

- name: Configure the Apache reverse proxy
  ansible.builtin.import_tasks: apache.yml
  when: nexus_use_apache | bool
  tags: ['nexus3']
